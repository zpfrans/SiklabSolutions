name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: siklab-react
        run: npm install

      - name: Build React frontend
        working-directory: siklab-react
        run: npm run build

      - name: Deploy to Hostinger
        shell: bash
        env:
          HOST: ${{ secrets.HOSTINGER_HOST || '195.35.62.124' }}
          USERNAME: ${{ secrets.HOSTINGER_USERNAME || 'u160668427' }}
          DEPLOYMENT_PATH: ${{ secrets.DEPLOYMENT_PATH || '/home/u160668427/public_html/siklab' }}
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail

          # Validate required values (HOST/USERNAME/DEPLOYMENT_PATH have defaults above).
          : "${SSH_PRIVATE_KEY:?Missing HOSTINGER_SSH_KEY secret}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key

          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/hostinger_deploy_key -p 65002 "$USERNAME@$HOST" '
            set -e
            export PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

            cd '"$DEPLOYMENT_PATH"'
            git pull origin main

            command -v npm >/dev/null 2>&1 || { echo "npm is not available in PATH"; exit 1; }

            cd siklab-react
            npm install
            npm run build

            cp -r dist/* "$HOME/public_html/"
            echo "Deployment completed at $(date)" >> ../deployment.log
          '

      - name: Deployment Status Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to Hostinger completed successfully!"
          else
            echo "❌ Deployment failed!"
          fi
