name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: siklab-react
        run: npm ci

      - name: Build React frontend
        working-directory: siklab-react
        run: npm run build

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

            cd ${{ secrets.DEPLOYMENT_PATH }}
            
            # Pull latest changes
            git pull origin main

            # Fail early if Node.js/NPM isn't available in this non-interactive shell
            command -v npm >/dev/null 2>&1 || { echo "npm is not available in PATH"; exit 1; }
            
            # Build and deploy frontend
            cd siklab-react
            npm ci
            npm run build

            # Publish built static files to Hostinger web root
            cp -r dist/* "$HOME/public_html/"
            
            # Log deployment
            echo "Deployment completed at $(date)" >> ../deployment.log

      - name: Deployment Status Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to Hostinger completed successfully!"
          else
            echo "❌ Deployment failed!"
          fi
